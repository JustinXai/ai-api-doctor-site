name: AI API Doctor CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify local checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node version
        run: node --version

      - name: Verify scoring v1.7
        run: node assets/verify-scoring-v17.js

      - name: Verify mock logic
        run: node assets/test-mock-verify.js

      - name: Verify evidence chain
        run: node assets/verify-evidence.js

      - name: Verify identity logic
        run: node assets/verify-identity.js

      - name: Verify risk label mapping v1.11.16
        run: node assets/verify-risk-label-mapping-v11116.js

      - name: Verify parse and fill v1.11.15
        run: node assets/verify-parse-fill-v11115.js

      - name: Verify compatibility boundary v1.11.15
        run: node assets/verify-compatibility-boundary-v11115.js

      - name: Verify calibration trace v1.11.14
        run: node assets/verify-calibration-trace-v11114.js

      - name: Verify final calibration v1.11.13
        run: node assets/verify-final-calibration-v11113.js

      - name: Verify score calibration v1.11.12
        run: node assets/verify-score-calibration-v11112.js

      - name: Verify golden cases v1.11.12
        run: node assets/verify-golden-cases-v11112.js
