/* 芒聰聙芒聰聙 Collapse toggle 芒聰聙芒聰聙 */
function toggleCollapse(id, btn) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  if (btn) btn.classList.toggle('open', open);
}

/* 芒聰聙芒聰聙 Tab switcher 芒聰聙芒聰聙 */
function switchTab(tab) {
  document.getElementById('tab-local') && document.getElementById('tab-local').classList.toggle('active', tab === 'local');
  document.getElementById('tab-manual') && document.getElementById('tab-manual').classList.toggle('active', tab === 'manual');
  document.getElementById('panel-local').style.display = tab === 'local' ? 'block' : 'none';
  document.getElementById('panel-manual').style.display = tab === 'manual' ? 'block' : 'none';
}

/* 芒聰聙芒聰聙 Cost hint (inline) 芒聰聙芒聰聙 */
function updateCostHint() {
  const hint = document.getElementById('cost-hint');
  if (!hint) return;
  const mode = window.Doctor ? window.Doctor._mode : 'quick';
  const cacheEnabled = document.getElementById('cache-test-toggle')?.checked || false;
  const sanityEnabled = document.getElementById('sanity-test-toggle')?.checked || false;

  if (mode === 'quick') {
    if (cacheEnabled) {
      hint.textContent = '氓驴芦茅聙聼茅陋聦猫麓搂茂录職茅垄聞猫庐隆 3 忙卢隆猫炉路忙卤聜茂录聦莽录聯氓颅聵氓聭陆盲赂颅忙拢聙忙碌聥氓聫炉猫聝陆忙露聢猫聙聴氓掳聭茅聡聫茅垄聺氓潞?;
    } else {
      hint.textContent = '氓驴芦茅聙聼茅陋聦猫麓搂茂录職茅垄聞猫庐隆 1 忙卢隆猫炉路忙卤聜茂录聦忙露聢猫聙聴忙聻聛盲陆?;
    }
  } else {
    let text = '氓庐聦忙聲麓茅陋聦猫麓搂茂录職茅垄聞猫庐?3芒聙? 忙卢隆猫炉路忙卤聜茂录聦氓聫炉猫聝陆盲潞搂莽聰聼氓掳聭茅聡聫忙聢聬忙聹卢';
    if (cacheEnabled) text += ' 脗路 氓聬芦莽录聯氓颅聵忙拢聙忙碌?;
    if (sanityEnabled) text += ' 脗路 氓聬芦忙篓隆氓聻聥忙拢聙忙碌?;
    hint.textContent = text;
  }
}

/* 芒聰聙芒聰聙 Manual Report 芒聰聙芒聰聙 */
window.ManualReport = {
  generate() {
    const f = id => document.getElementById(id);
    const get = (id, fb = '') => f(id)?.value?.trim() || fb;
    const num = id => parseFloat(f(id)?.value) || 0;
    const baseUrl = get('manual-base-url');
    const model = get('manual-model');
    if (!baseUrl) { window.showToast && window.showToast('猫炉路氓隆芦氓聠?Base URL'); return; }
    if (!model) { window.showToast && window.showToast('猫炉路氓隆芦氓聠?Model ID'); return; }
    const httpStatus = num('manual-http-status');
    const pt = num('manual-prompt-tokens');
    const ct = num('manual-completion-tokens');
    const tt = num('manual-total-tokens');
    const timestamp = new Date().toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const usageOk = pt && ct && tt;
    const hasOutput = ct > 0;
    const ok = httpStatus >= 200 && httpStatus < 400 && hasOutput;
    const bg = ok ? '#dcfce7' : httpStatus >= 400 ? '#fee2e2' : '#fef3c7';
    const color = ok ? '#16a34a' : httpStatus >= 400 ? '#dc2626' : '#d97706';
    const label = ok ? '忙颅拢氓赂赂' : httpStatus >= 400 ? '氓录聜氓赂赂' : '茅聹聙氓陇聧忙聼楼';
    const sub = ok ? '猫聛聰茅聙職忙颅拢氓赂? : httpStatus >= 400 ? '猫聛聰茅聙職氓陇卤猫麓? : '猫炉路忙聽赂氓庐聻忙聣拢猫麓?;

    f('result-card').innerHTML = `
      <div class="report-card">
        <div class="report-card__header">
          <div class="report-card__title">AI API Doctor</div>
          <div class="report-card__meta">API Key 忙聹陋氓聦聟氓聬?&middot; ${timestamp}</div>
        </div>
        <div class="report-card__status" style="background:${bg}">
          <div class="report-card__status-label" style="color:${color}">${label}</div>
          <div class="report-card__status-text">${sub}</div>
        </div>
        <div class="report-card__grid">
          <div class="report-cell"><div class="report-cell__label">Base URL</div><div class="report-cell__value mono">${esc(baseUrl)}</div></div>
          <div class="report-cell"><div class="report-cell__label">忙篓隆氓聻聥</div><div class="report-cell__value mono">${esc(model)}</div></div>
          <div class="report-cell"><div class="report-cell__label">HTTP</div><div class="report-cell__value mono" style="color:${httpStatus>=400?'#dc2626':'#16a34a'}">${httpStatus||'芒聙?}</div></div>
          <div class="report-cell"><div class="report-cell__label">usage</div><div class="report-cell__value">${usageOk?'氓庐聦忙聲麓':'盲赂聧氓庐聦忙聲?}</div></div>
          <div class="report-cell"><div class="report-cell__label">completion</div><div class="report-cell__value mono">${ct||'芒聙?}</div></div>
          <div class="report-cell"><div class="report-cell__label">total</div><div class="report-cell__value mono">${tt||'芒聙?}</div></div>
        </div>
        <div class="report-card__footer">忙聹卢忙聤楼氓聭聤氓聫陋氓卤聲莽陇潞忙聹卢忙卢隆忙碌聥猫炉聲盲赂颅莽職聞氓聫炉氓陇聧莽聨掳盲驴隆氓聫路茂录聦盲赂聧猫炉聛忙聵聨忙聹聧氓聤隆氓聲聠盲赂禄猫搂聜忙聲聟忙聞聫茂录聦盲鹿聼盲赂聧忙聻聞忙聢聬忙鲁聲氓戮聥莽禄聯猫庐潞茫聙?/div>
      </div>`;
  },
  clear() {
    ['manual-provider','manual-base-url','manual-model','manual-http-status','manual-prompt-tokens','manual-completion-tokens','manual-total-tokens','manual-cached-tokens'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const card = document.getElementById('result-card');
    if (card) card.outerHTML = '<div id="result-card" class="result-empty-state">氓隆芦氓聠聶 Base URL茫聙聛API Key 氓聮?Model ID 氓聬聨氓录聙氓搂聥忙拢聙忙碌聥茫聙?/div>';
    window.showToast && window.showToast('氓路虏忙赂聟莽漏?);
  }
};

/* 芒聰聙芒聰聙 Esc 芒聰聙芒聰聙 */
function esc(str) {
  if (!str && str !== 0) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* 芒聰聙芒聰聙 Init 芒聰聙芒聰聙 */
document.addEventListener('DOMContentLoaded', () => {
  if (window.Doctor) { window.Doctor.init(); window.Doctor.setMode('quick'); }
  updateCostHint();
  /* updateCostEstimate kept for test.js compatibility */
  if (typeof updateCostEstimate === 'function') updateCostEstimate();
});
</script>

</body>
</html>
